schema_version: 1

context:
  name: fenics-ufl
  version: "2019.1.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://bitbucket.org/fenics-project/ufl/downloads/ufl-{{ version }}.tar.gz
  sha256: 213a56bfa2edb0365909fa6f110f970e582b10a3f5f1fd9a0e85254f1eefaa11
  patches:
    - setuptools82.patch

build:
  number: 39
  noarch: python
  script: ${{ PYTHON }} -m pip install --no-deps -vv .

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - numpy

tests:
  - python:
    python_version: ${{ python_min }}.*
    imports:
      - ufl
      - ufl.utils
      - ufl.finiteelement
      - ufl.core
      - ufl.corealg
      - ufl.algorithms
  - requirements:
    run:
      - pip
      - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: Unified Form Language
  description: |
    The Unified Form Language (UFL) is a domain specific language
    for declaration of finite element discretizations of variational forms.
    More precisely, it defines a flexible interface for choosing finite element spaces
    and defining expressions for weak forms in a notation close to mathematical notation.

    UFL is part of the FEniCS Project.
  license: LGPL-3.0-or-later
  license_file: COPYING.LESSER
  homepage: https://fenicsproject.org
  repository: https://bitbucket.org/fenics-project/ufl
  documentation: https://fenics.readthedocs.io/projects/ufl/en/latest/

extra:
  recipe-maintainers:
    - jorgensd
    - minrk
